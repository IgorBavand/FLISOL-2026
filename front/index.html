<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Palestra - Spring + HTML</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }

        .input-box {
            display: flex;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        input:focus { border-color: #007bff; }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #0056b3; }

        ul {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            font-size: 0.7rem;
            padding: 3px 7px;
            border-radius: 10px;
            background: #e9ecef;
            color: #495057;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>ToDo List API</h2>
    
    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Nova tarefa...">
        <button onclick="addTask()">OK</button>
    </div>

    <ul id="taskList">
        </ul>
</div>

<script>
    const API_URL = 'http://localhost:8080/tasks';

    document.getElementById('taskInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTask();
    });

    async function fetchTasks() {
        const list = document.getElementById('taskList');
        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error();
            const tasks = await response.json();
            
            list.innerHTML = tasks.map(t => `
                <li>
                    <span>${t.title || 'Sem título'}</span>
                    <span class="badge">${t.done ? 'Pronto' : 'Pendente'}</span>
                </li>
            `).join('');
        } catch (error) {
            list.innerHTML = '<p style="color:red">Erro: Backend offline.</p>';
        }
    }

    async function addTask() {
        const input = document.getElementById('taskInput');
        if (!input.value.trim()) return;

        try {
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    title: input.value, 
                    done: false 
                })
            });
            input.value = '';
            fetchTasks();
        } catch (error) {
            alert('Erro ao salvar no Spring!');
        }
    }

    fetchTasks();
</script>

</body>
</html>
