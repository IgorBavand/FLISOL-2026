<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager - Spring Boot</title>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
+

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Inter, 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      margin: 0;
      background: #f4f7fb;
      color: #1f2937;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 980px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
      overflow: hidden;
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 560px;
    }

    .sidebar {
      background: linear-gradient(180deg, #0f172a, #1e293b);
      color: white;
      padding: 32px;
    }

    .sidebar h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .sidebar p {
      color: #cbd5e1;
      line-height: 1.6;
      margin-top: 12px;
    }

    .tech-badge {
      display: inline-block;
      margin-top: 24px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      font-size: 0.85rem;
    }

    .content {
      padding: 32px;
    }

    .header {
      margin-bottom: 28px;
    }

    .header h2 {
      margin: 0;
      font-size: 1.6rem;
      color: #111827;
    }

    .header span {
      color: #6b7280;
      font-size: 0.95rem;
    }

    .input-box {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    input {
      flex: 1;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      outline: none;
      font-size: 1rem;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0 22px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 340px;
      overflow-y: auto;
    }

    li {
      padding: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #ffffff;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInItem 0.4s ease forwards;
    }

    @keyframes fadeInItem {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    li span:first-child {
      font-weight: 500;
      color: #111827;
    }

    .badge {
      font-size: 0.75rem;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 600;
    }

    @media (max-width: 760px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        padding: 24px;
      }

      .content {
        padding: 24px;
      }

      .input-box {
        flex-direction: column;
      }

      button {
        padding: 14px;
      }
    }
  </style>
</head>

<body>

  <main class="app">
    <aside class="sidebar">
      <h1>Task Manager</h1>
      <p>Aplicação integrada com API REST em Spring Boot.</p>
      <span class="tech-badge">Spring Boot + HTML + JS</span>
    </aside>

    <section class="content">
      <div class="header">
        <h2>Minhas tarefas</h2>
        <span>Gerencie suas atividades com eficiência</span>
      </div>

      <div class="input-box">
        <input type="text" id="taskInput" placeholder="Adicionar nova tarefa">
        <button onclick="addTask()">Adicionar</button>
      </div>

      <ul id="taskList"></ul>
    </section>
  </main>

  <script>
    const API_URL = 'http://localhost:8080/tasks';

    document.getElementById('taskInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTask();
    });

    function celebrate() {
      const duration = 1200;
      const end = Date.now() + duration;

      const colors = ['#2563eb', '#4f46e5', '#22c55e', '#f59e0b'];

      (function frame() {
        confetti({
          particleCount: 4,
          angle: 60,
          spread: 70,
          origin: { x: 0 },
          colors
        });

        confetti({
          particleCount: 4,
          angle: 120,
          spread: 70,
          origin: { x: 1 },
          colors
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      })();
    }

    async function fetchTasks() {
      const list = document.getElementById('taskList');

      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error();

        const tasks = await response.json();

        list.innerHTML = tasks.map(t => `
          <li>
            <span>${t.title || 'Sem título'}</span>
            <span class="badge">${t.done ? 'Pronto' : 'Pendente'}</span>
          </li>
        `).join('');
      } catch (error) {
        list.innerHTML = '<p style="color:#dc2626">Erro: Backend offline.</p>';
      }
    }

    async function addTask() {
      const input = document.getElementById('taskInput');

      if (!input.value.trim()) return;

      try {
        await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: input.value,
            done: false
          })
        });

        input.value = '';

        celebrate();

        fetchTasks();
      } catch (error) {
        alert('Erro ao salvar no Spring!');
      }
    }

    fetchTasks();
  </script>

</body>
</html>
